<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NFT Holder Scanner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f9f9f8;
    color: #111;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 14px;
    min-height: 100vh;
    padding: 60px 24px 80px;
  }

  .page { max-width: 620px; margin: 0 auto; }

  /* ── HEADER ── */
  h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
    color: #111;
  }
  .subtitle { color: #888; font-size: 13px; margin-bottom: 40px; }

  /* ── FORM SECTIONS ── */
  .field { margin-bottom: 24px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 8px;
  }

  input[type="text"],
  input[type="password"],
  input[type="number"] {
    width: 100%;
    border: 1px solid #e0e0de;
    border-radius: 6px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 13px;
    color: #111;
    background: #fff;
    outline: none;
    transition: border-color 0.15s;
    appearance: textfield;
  }
  input[type="number"] { -moz-appearance: textfield; }
  input[type="number"]::-webkit-inner-spin-button { display: none; }
  input:focus { border-color: #aaa; }
  input::placeholder { color: #bbb; }

  /* ── RANGES ── */
  #rangesEditor { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }

  .range-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #fff;
    border: 1px solid #e0e0de;
    border-radius: 6px;
    padding: 8px 10px;
  }

  .range-row input[type="number"] {
    width: 72px;
    text-align: center;
    padding: 7px 8px;
    border-radius: 5px;
    font-size: 13px;
  }

  .sep { color: #ccc; font-size: 13px; flex-shrink: 0; }

  .inf-label {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: #999; cursor: pointer;
    flex-shrink: 0; user-select: none; white-space: nowrap;
  }
  .inf-label input[type="checkbox"] { accent-color: #111; cursor: pointer; width: 13px; height: 13px; }

  input[type="color"] {
    width: 28px; height: 28px;
    border: 1px solid #e0e0de;
    border-radius: 4px;
    padding: 2px;
    background: #fff;
    cursor: pointer;
    flex-shrink: 0;
  }

  .btn-remove {
    background: none; border: none;
    color: #ccc; font-size: 16px; cursor: pointer;
    padding: 0 2px; line-height: 1;
    margin-left: auto; flex-shrink: 0;
    transition: color 0.15s;
  }
  .btn-remove:hover { color: #e05050; }

  .btn-add-range {
    width: 100%;
    background: none;
    border: 1px dashed #d8d8d6;
    border-radius: 6px;
    padding: 9px;
    font-family: inherit;
    font-size: 12px;
    color: #aaa;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .btn-add-range:hover { border-color: #bbb; color: #666; background: #fafaf9; }

  /* ── SCAN BUTTON ── */
  .btn-scan {
    width: 100%;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 13px;
    font-family: inherit;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.01em;
  }
  .btn-scan:hover:not(:disabled) { background: #222; }
  .btn-scan:active:not(:disabled) { transform: scale(0.99); }
  .btn-scan:disabled { background: #ccc; cursor: not-allowed; }

  /* ── STATUS ── */
  .status {
    margin-top: 20px;
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 6px;
  }
  .status.loading { background: #f4f4f2; color: #888; animation: pulse 1.2s ease-in-out infinite; }
  .status.error   { background: #fff0f0; color: #c04040; border: 1px solid #f0cece; }
  @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
  .hidden { display: none !important; }

  /* ── RESULTS ── */
  #results { margin-top: 36px; }

  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid #e8e8e6;
  }
  .results-title { font-size: 15px; font-weight: 600; color: #111; }
  .results-meta  { font-size: 12px; color: #aaa; }

  .tier-block { margin-bottom: 28px; }

  .tier-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .tier-name {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tier-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    display: inline-block;
  }

  .tier-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .count-pill {
    font-size: 11px;
    color: #999;
    background: #f0f0ee;
    border-radius: 20px;
    padding: 2px 9px;
  }

  .btn-copy-tier {
    background: none;
    border: 1px solid #e0e0de;
    border-radius: 4px;
    padding: 4px 10px;
    font-family: inherit;
    font-size: 11px;
    color: #888;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .btn-copy-tier:hover { border-color: #bbb; color: #333; }

  .wallet-table {
    border: 1px solid #e8e8e6;
    border-radius: 8px;
    overflow: hidden;
  }

  .wallet-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px;
    border-bottom: 1px solid #f0f0ee;
    gap: 12px;
    transition: background 0.1s;
  }
  .wallet-item:last-child { border-bottom: none; }
  .wallet-item:hover { background: #fafaf9; }

  .wallet-addr-text {
    font-size: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: #555;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .wallet-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .holding-num {
    font-size: 12px;
    font-weight: 600;
    color: #999;
    min-width: 24px;
    text-align: right;
  }

  .ico-btn {
    background: none; border: none;
    color: #ccc; cursor: pointer;
    font-size: 13px; padding: 2px 4px;
    line-height: 1; transition: color 0.12s;
  }
  .ico-btn:hover { color: #555; }

  a.scan-link {
    color: #ccc; font-size: 12px; text-decoration: none;
    transition: color 0.12s;
  }
  a.scan-link:hover { color: #555; }

  .empty-tier {
    padding: 14px;
    font-size: 12px;
    color: #ccc;
    text-align: center;
    border: 1px solid #e8e8e6;
    border-radius: 8px;
  }

  .btn-toggle {
    background: none;
    border: 1px solid #e0e0de;
    border-radius: 4px;
    padding: 4px 10px;
    font-family: inherit;
    font-size: 11px;
    color: #888;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
    letter-spacing: 0.02em;
  }
  .btn-toggle:hover { border-color: #bbb; color: #333; }

  .chevron-icon {
    display: inline-block;
    transition: transform 0.2s ease;
    font-style: normal;
    font-size: 10px;
  }
  .chevron-icon.open { transform: rotate(180deg); }

  .tier-body { display: none; margin-top: 8px; }
  .tier-body.open { display: block; }

  .divider {
    border: none;
    border-top: 1px solid #e8e8e6;
    margin: 28px 0;
  }
</style>
</head>
<body>
<div class="page">

  <h1>NFT Holder Scanner</h1>
  <p class="subtitle">Snapshot holders by range from any ERC-721 contract</p>

  <div class="field">
    <label>Alchemy API Key</label>
    <input type="password" id="apiKey" placeholder="paste your key here" />
  </div>

  <div class="field">
    <label>Contract Address</label>
    <input type="text" id="contractAddr"
      value="0x06f97e756f5c7ac0db75411101bd09e17f63aba7"
      placeholder="0x..." />
  </div>

  <div class="field">
    <label>Holder Ranges</label>
    <div id="rangesEditor"></div>
    <button class="btn-add-range" onclick="addRange()" style="margin-top:6px;">+ Add range</button>
  </div>

  <button class="btn-scan" id="scanBtn" onclick="startScan()">Scan holders</button>

  <div id="status" class="status hidden"></div>
  <div id="results" class="hidden"></div>

</div>
<script>
// ── State ─────────────────────────────────────────────
let ranges = [
  { min: 5,  max: 10,  inf: false, color: "#f0a030" },
  { min: 11, max: 20,  inf: false, color: "#9b72cf" },
  { min: 21, max: 30,  inf: false, color: "#4a9edd" },
  { min: 31, max: 999, inf: true,  color: "#3dbf90" },
];
const PALETTE = ["#f0a030","#9b72cf","#4a9edd","#3dbf90","#e05080","#60b040","#d06040","#4080d0"];

// ── Auto-label from range values ───────────────────────
function rangeLabel(r) {
  if (r.inf) return r.min + "+";
  return r.min + " – " + r.max;
}

// ── Render range rows ──────────────────────────────────
function renderEditor() {
  const el = document.getElementById("rangesEditor");
  el.innerHTML = "";
  ranges.forEach(function(r, i) {
    const row = document.createElement("div");
    row.className = "range-row";
    row.innerHTML =
      '<input type="number" min="0" placeholder="Min" value="' + r.min + '" oninput="updateRange(' + i + ',\'min\',+this.value)" />' +
      '<span class="sep">to</span>' +
      '<input type="number" min="0" placeholder="Max" id="maxInp_' + i + '" value="' + (r.inf ? '' : r.max) + '" ' + (r.inf ? 'disabled style="opacity:0.3"' : '') + ' oninput="updateRange(' + i + ',\'max\',+this.value)" />' +
      '<label class="inf-label"><input type="checkbox" ' + (r.inf ? 'checked' : '') + ' onchange="toggleInf(' + i + ',this.checked)" /> no limit</label>' +
      '<input type="color" value="' + r.color + '" oninput="updateRange(' + i + ',\'color\',this.value)" />' +
      '<button class="btn-remove" onclick="removeRange(' + i + ')" title="Remove">×</button>';
    el.appendChild(row);
  });
}

function updateRange(i, key, val) { ranges[i][key] = val; }

function toggleInf(i, checked) {
  ranges[i].inf = checked;
  const inp = document.getElementById("maxInp_" + i);
  inp.disabled = checked;
  inp.style.opacity = checked ? "0.3" : "1";
  if (checked) ranges[i].max = 999999;
}

function addRange() {
  const color = PALETTE[ranges.length % PALETTE.length];
  const last  = ranges.length ? (ranges[ranges.length-1].inf ? 999999 : ranges[ranges.length-1].max) : 0;
  ranges.push({ min: last + 1, max: last + 10, inf: false, color });
  renderEditor();
}

function removeRange(i) { ranges.splice(i, 1); renderEditor(); }

// ── Status ─────────────────────────────────────────────
function showStatus(msg, type) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = "status " + type;
  el.classList.remove("hidden");
}
function hideStatus() { document.getElementById("status").classList.add("hidden"); }

// ── Build active ranges ────────────────────────────────
function buildRanges() {
  return ranges.map(function(r) {
    return { min: +r.min || 0, max: r.inf ? Infinity : (+r.max || 0), color: r.color, inf: r.inf };
  }).filter(function(r) { return r.min <= r.max || r.max === Infinity; });
}

// ── Scan ───────────────────────────────────────────────
async function startScan() {
  const apiKey   = document.getElementById("apiKey").value.trim();
  const contract = document.getElementById("contractAddr").value.trim();
  if (!apiKey)                           { showStatus("Enter your Alchemy API key.", "error"); return; }
  if (!contract || !contract.startsWith("0x")) { showStatus("Enter a valid contract address (0x...).", "error"); return; }
  const active = buildRanges();
  if (!active.length)                    { showStatus("Define at least one valid range.", "error"); return; }

  document.getElementById("scanBtn").disabled = true;
  document.getElementById("results").classList.add("hidden");
  showStatus("Connecting…", "loading");

  try {
    const ownerMap = await fetchOwners(apiKey, contract);
    hideStatus();
    renderResults(ownerMap, active, contract);
  } catch(e) {
    showStatus(e.message || "Fetch failed. Check your API key.", "error");
  } finally {
    document.getElementById("scanBtn").disabled = false;
  }
}

// ── Fetch ──────────────────────────────────────────────
async function fetchOwners(apiKey, contract) {
  const base = "https://eth-mainnet.g.alchemy.com/nft/v3/" + apiKey;
  let pageKey = null, ownerMap = {}, page = 0;
  do {
    page++;
    showStatus("Fetching page " + page + "…", "loading");
    const url = new URL(base + "/getOwnersForContract");
    url.searchParams.set("contractAddress", contract);
    url.searchParams.set("withTokenBalances", "true");
    if (pageKey) url.searchParams.set("pageKey", pageKey);
    const res = await fetch(url.toString());
    if (!res.ok) {
      let msg = "HTTP " + res.status;
      try { const j = await res.json(); msg = j.error?.message || msg; } catch(_){}
      throw new Error(msg);
    }
    const data = await res.json();
    pageKey = data.pageKey || null;
    for (const o of data.owners || []) {
      const n = (o.tokenBalances || []).reduce(function(s,t){ return s+(parseInt(t.balance)||0); }, 0);
      ownerMap[o.ownerAddress] = (ownerMap[o.ownerAddress] || 0) + n;
    }
  } while (pageKey);
  return ownerMap;
}

// ── Render ─────────────────────────────────────────────
function renderResults(ownerMap, active, contract) {
  const total = Object.keys(ownerMap).length;
  const shortContract = contract.slice(0,6) + "…" + contract.slice(-4);

  const bucketed = active.map(function(r) {
    return Object.assign({}, r, {
      wallets: Object.entries(ownerMap)
        .filter(function(e){ return e[1] >= r.min && e[1] <= r.max; })
        .sort(function(a,b){ return b[1]-a[1]; })
    });
  });
  window._bucketed = bucketed;

  let html =
    '<div class="results-header">' +
      '<span class="results-title">' + shortContract + '</span>' +
      '<span class="results-meta">' + total.toLocaleString() + ' unique holders</span>' +
    '</div>';

  bucketed.forEach(function(b, i) {
    const lbl = rangeLabel(b);
    const wc  = b.wallets.length;

    let tableHtml = "";
    if (wc === 0) {
      tableHtml = '<div class="empty-tier">No holders in this range</div>';
    } else {
      tableHtml = '<div class="wallet-table">' +
        b.wallets.map(function(e) {
          const addr = e[0], n = e[1];
          return '<div class="wallet-item">' +
            '<span class="wallet-addr-text" title="' + addr + '">' + addr + '</span>' +
            '<div class="wallet-right">' +
              '<span class="holding-num">' + n + '</span>' +
              '<button class="ico-btn" onclick="copyText(\'' + addr + '\',this)" title="Copy">⧉</button>' +
              '<a class="scan-link" href="https://etherscan.io/address/' + addr + '" target="_blank" title="Etherscan">↗</a>' +
            '</div>' +
          '</div>';
        }).join("") +
      '</div>';
    }

    const bodyId = "tbody_" + i;
    const chevId = "chev_" + i;

    html +=
      '<div class="tier-block">' +
        '<div class="tier-top">' +
          '<span class="tier-name"><span class="tier-dot" style="background:' + b.color + '"></span>' + lbl + ' holders</span>' +
          '<div class="tier-actions">' +
            '<span class="count-pill">' + wc + '</span>' +
            '<button class="btn-copy-tier" onclick="copyBucket(' + i + ',this)">Copy all</button>' +
            '<button class="btn-toggle" onclick="toggleBody(\'' + bodyId + '\',\'' + chevId + '\')">' +
              '<i class="chevron-icon" id="' + chevId + '">▼</i>' +
            '</button>' +
          '</div>' +
        '</div>' +
        '<div class="tier-body" id="' + bodyId + '">' + tableHtml + '</div>' +
      '</div>';

    if (i < bucketed.length - 1) html += '<hr class="divider"/>';
  });

  const el = document.getElementById("results");
  el.innerHTML = html;
  el.classList.remove("hidden");

  // Start all tiers expanded
  bucketed.forEach(function(_, i) {
    document.getElementById("tbody_" + i).classList.add("open");
    document.getElementById("chev_" + i).classList.add("open");
  });
}

function toggleBody(bodyId, chevId) {
  document.getElementById(bodyId).classList.toggle("open");
  document.getElementById(chevId).classList.toggle("open");
}

function copyBucket(i, btn) {
  const text = window._bucketed[i].wallets.map(function(e){ return e[0]; }).join("\n");
  navigator.clipboard.writeText(text).then(function() {
    const orig = btn.textContent;
    btn.textContent = "Copied!";
    setTimeout(function(){ btn.textContent = orig; }, 2000);
  });
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(function() {
    const orig = btn.textContent;
    btn.textContent = "✓";
    setTimeout(function(){ btn.textContent = orig; }, 1500);
  });
}

document.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && (e.target.id === "apiKey" || e.target.id === "contractAddr")) startScan();
});

renderEditor();
</script>
</body>
</html>
